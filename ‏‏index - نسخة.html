<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueTech - الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }
        
        body {
            background: #000;
            color: #e6eef8;
        }
        
        a {
            color: inherit;
            text-decoration: none;
        }
        /* Header */
        
        header {
            background-color: #0a0a0a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 36px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 0 18px rgba(0, 153, 255, 0.12);
        }
        
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00aaff;
            text-shadow: 0 0 8px #0088cc;
            cursor: pointer;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 26px;
            align-items: center;
        }
        
        nav ul li a {
            color: #cfdff6;
            font-size: 1rem;
            transition: .22s;
            padding: 6px 4px;
        }
        
        nav ul li a:hover,
        nav ul li a.active {
            color: #00aaff;
            text-shadow: 0 0 8px rgba(0, 170, 255, 0.35);
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }
        
        .hamburger span {
            width: 24px;
            height: 3px;
            background: #00aaff;
            border-radius: 3px;
        }
        /* Hero */
        
        .hero {
            text-align: center;
            padding: 48px 18px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(96, 165, 250, 0.95));
            color: #fff;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        }
        
        .hero h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .hero p {
            margin-bottom: 18px;
            opacity: 0.95;
        }
        
        .hero .controls button {
            margin: 6px;
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .hero #shopBtn {
            background: #10b981;
            color: #fff;
        }
        
        .hero #shopBtn:hover {
            background: #059669;
        }
        
        .hero .cart-open-btn {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 9px 14px;
            border-radius: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .hero .cart-open-btn i {
            font-size: 1.2rem;
        }
        
        .hero .cart-open-btn:hover {
            box-shadow: 0 0 12px #00bfff;
            transform: scale(1.05);
        }
        
        .hero .cart-open-btn span#cartCount {
            background: #ff4d4f;
            color: #fff;
            padding: 2px 6px;
            border-radius: 999px;
            margin-left: 4px;
            font-weight: 700;
        }
        
        #cartCount.glow {
            animation: glowAnim 0.3s ease;
        }
        
        @keyframes glowAnim {
            0% {
                transform: scale(1);
                text-shadow: 0 0 0 #ff4d4f;
            }
            50% {
                transform: scale(1.3);
                text-shadow: 0 0 10px #ff4d4f, 0 0 20px #ff4d4f;
            }
            100% {
                transform: scale(1);
                text-shadow: 0 0 0 #ff4d4f;
            }
        }
        /* Products */
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 22px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }
        
        .product {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.6);
            transition: transform .25s ease, box-shadow .25s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        
        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product:hover img {
            transform: scale(1.1);
            box-shadow: 0 0 15px #00ffff;
        }
        
        .product h3 {
            color: #dff3ff;
            font-size: 1.05rem;
            margin-bottom: 6px;
        }
        
        .product p.price {
            color: #a8e6ff;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .product button {
            padding: 9px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #00aaff, #0088cc);
            color: #fff;
            font-weight: 700;
            transition: transform .18s, box-shadow .18s;
            position: relative;
            overflow: hidden;
        }
        
        .product button::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, rgba(0, 170, 255, 0.5), rgba(0, 255, 255, 0.5), rgba(0, 170, 255, 0.5));
            transform: rotate(45deg) translate(-100%, -100%);
            transition: transform 0.5s ease;
            z-index: -1;
        }
        
        .product button:hover::before {
            transform: rotate(45deg) translate(0, 0);
        }
        
        .product button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.28);
        }
        /* Cart */
        
        #cartWindow {
            position: fixed;
            top: 60px;
            right: -350px;
            width: 300px;
            background: #111;
            border-left: 1px solid #00bfff;
            padding: 15px;
            transition: 0.3s;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        #cartWindow.active {
            right: 0;
        }
        
        #cartWindow h3 {
            color: #00bfff;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            gap: 8px;
        }
        
        .cart-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }
        
        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .item-name {
            color: #fff;
            font-weight: bold;
        }
        
        .item-price {
            color: #00bfff;
            font-size: 0.9em;
        }
        
        .item-qty {
            margin-top: 4px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .qty-btn {
            background: #00aaff;
            color: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .remove-item {
            background: red;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        /* Footer */
        
        footer {
            padding: 20px;
            background: #111;
            text-align: center;
            border-top: 1px solid #00bfff;
        }
        
        footer a {
            color: #00bfff;
            text-decoration: none;
            transition: 0.3s;
        }
        
        footer a:hover {
            color: #00ffff;
        }
        /* Responsive */
        
        @media(max-width:768px) {
            nav ul {
                flex-direction: column;
                background: #111;
                position: fixed;
                top: 60px;
                right: -100%;
                padding: 18px;
                width: 220px;
                height: calc(100%-60px);
                transition: .25s;
            }
            nav ul.active {
                right: 0;
            }
            .hamburger {
                display: flex;
            }
            .products {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">BlueTech</div>
        <nav>
            <ul id="navMenu">
                <li><a href="index.html" class="active">الرئيسية</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </nav>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </header>

    <section class="hero">
        <h2>أحدث الأجهزة الإلكترونية</h2>
        <p>أفضل التقنيات بأحدث الأسعار</p>
        <div class="controls">
            <button id="shopBtn">تسوق الآن</button>
            <button class="cart-open-btn"><i class="fa-solid fa-cart-shopping"></i> سلة المشتريات <span id="cartCount">0</span></button>
        </div>
    </section>

    <section class="products" id="productList"></section>

    <div id="cartWindow">
        <h3>سلة المشتريات</h3>
        <div id="cartItems"></div>
        <p id="totalPrice">الإجمالي: 0 جنيه</p>
    </div>

    <footer>
        <p>© 2025 BlueTech - جميع الحقوق محفوظة</p>
        <p>تابعنا على
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('navMenu');
            const cartBtn = document.querySelector('.cart-open-btn');
            const cartPopup = document.getElementById('cartWindow');
            const cartItemsContainer = document.getElementById('cartItems');
            const totalPriceEl = document.getElementById('totalPrice');
            const cartCountEl = document.getElementById('cartCount');
            const shopBtn = document.getElementById('shopBtn');

            let cart = [];

            hamburger.addEventListener('click', () => navMenu.classList.toggle('active'));
            shopBtn.addEventListener('click', () => document.getElementById('productList').scrollIntoView({
                behavior: 'smooth'
            }));

            const products = [{
                name: 'سماعة رأس',
                price: 500,
                img: 'images/headphones.png'
            }, {
                name: 'لابتوب HP',
                price: 12000,
                img: 'images/laptop.png'
            }, {
                name: 'كيبورد ميكانيكي',
                price: 700,
                img: 'images/keyboard.png'
            }, {
                name: 'فأرة لاسلكية',
                price: 350,
                img: 'images/mouse.png'
            }, {
                name: 'هاتف سامسونج',
                price: 9000,
                img: 'images/phone.png'
            }, {
                name: 'سماعة بلوتوث',
                price: 400,
                img: 'images/speaker.png'
            }, {
                name: 'ساعة ذكية',
                price: 1500,
                img: 'images/watch.png'
            }, {
                name: 'هارد ديسك خارجي',
                price: 800,
                img: 'images/hard.jpg'
            }];

            function displayProducts() {
                const productList = document.getElementById('productList');
                productList.innerHTML = '';
                products.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product';
                    div.innerHTML = `
                        <img src="${p.img}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price} جنيه</p>
                        <button>أضف للسلة</button>
                    `;
                    productList.appendChild(div);
                });
            }

            displayProducts();

            document.getElementById('productList').addEventListener('click', e => {
                if (e.target.tagName === 'BUTTON') {
                    const product = e.target.closest('.product');
                    const name = product.querySelector('h3').innerText;
                    const price = parseInt(product.querySelector('.price').innerText.replace(/[^0-9]/g, '')) || 0;
                    const img = product.querySelector('img').src;

                    const existing = cart.find(item => item.name === name);
                    if (existing) existing.quantity += 1;
                    else cart.push({
                        name,
                        price,
                        img,
                        quantity: 1
                    });

                    updateCart();
                    cartPopup.classList.add('active');

                    cartCountEl.classList.add('glow');
                    setTimeout(() => cartCountEl.classList.remove('glow'), 300);
                }
            });

            function updateCart() {
                cartItemsContainer.innerHTML = '';
                let total = 0,
                    count = 0;

                cart.forEach((item, index) => {
                    total += item.price * item.quantity;
                    count += item.quantity;

                    const div = document.createElement('div');
                    div.classList.add('cart-item');
                    div.innerHTML = `
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-details">
                            <span class="item-name">${item.name}</span>
                            <span class="item-price">${item.price * item.quantity} جنيه</span>
                            <div class="item-qty">
                                <button class="qty-btn" data-index="${index}" data-action="dec">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" data-index="${index}" data-action="inc">+</button>
                            </div>
                        </div>
                        <button class="remove-item" data-index="${index}">×</button>
                    `;
                    cartItemsContainer.appendChild(div);
                });

                totalPriceEl.innerText = `الإجمالي: ${total} جنيه`;
                cartCountEl.innerText = count;
            }

            cartItemsContainer.addEventListener('click', e => {
                const index = e.target.getAttribute('data-index');
                if (index === null) return;
                const i = parseInt(index);

                if (e.target.classList.contains('qty-btn')) {
                    const action = e.target.getAttribute('data-action');
                    if (action === 'inc') cart[i].quantity++;
                    else if (action === 'dec') {
                        if (cart[i].quantity > 1) cart[i].quantity--;
                        else cart.splice(i, 1);
                    }
                } else if (e.target.classList.contains('remove-item')) {
                    cart.splice(i, 1);
                }
                updateCart();
            });

            cartBtn.addEventListener('click', () => cartPopup.classList.toggle('active'));
        });
    </script>
</body>

</html>
